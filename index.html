<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conrado Adverci - Eletromancer</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #00ff88; /* Verde tech para remeter a PCBs e eletrônica */
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .profile-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border-top: 4px solid var(--accent);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #333;
            margin: 0 auto 15px;
            border: 2px solid var(--accent);
            /* Substitua a URL abaixo pela sua foto de perfil */
            background-image: url('https://via.placeholder.com/100'); 
            background-size: cover;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 5px;
        }

        h2 {
            font-size: 1rem;
            color: var(--accent);
            margin: 0 0 10px;
            font-weight: 500;
        }

        p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0 0 20px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .tag {
            background-color: #2a2a2a;
            color: var(--text-main);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid #444;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            background-color: #2a2a2a;
            color: var(--text-main);
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .link-btn:hover {
            background-color: #333;
            border-color: var(--accent);
        }

        .link-btn.primary {
            background-color: var(--accent);
            color: #000;
        }

        .link-btn.primary:hover {
            background-color: #00cc6a;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="avatar"></div>
        <h1>Conrado Adverci</h1>
        <h2>Eletromancer</h2>
        <p>Vila Velha, ES<br>Desenvolvimento de Hardware & Sistemas Embarcados</p>

        <div class="tags">
            <span class="tag">PCB Design</span>
            <span class="tag">ESP32 / Microcontroladores</span>
            <span class="tag">KiCad</span>
            <span class="tag">Impressão 3D</span>
        </div>

        <div class="links">
            <a href="https://wa.me/5527999999999" class="link-btn primary" target="_blank">Falar no WhatsApp</a>
            <a href="#" class="link-btn" target="_blank">LinkedIn</a>
            <a href="#" class="link-btn" target="_blank">GitHub</a>
            <a href="#" class="link-btn" target="_blank">Projetos (TeRES / Pocket Fab)</a>
        </div>
    </div>

</body>
</html>
